name: journeymate_mobile
description: "JourneyMate - Tu compañero de viaje inteligente"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Navegación ────────────────────────────────────────────────
  go_router: ^13.0.0

  # ── Animaciones ───────────────────────────────────────────────
  flutter_animate: ^4.5.0

  # ── Red / HTTP ────────────────────────────────────────────────
  http: ^1.2.0
  dio: ^5.4.3

  # ── Almacenamiento local ──────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── 3D / Assets ───────────────────────────────────────────────
  video_player: ^2.8.0

  # ── Iconos ────────────────────────────────────────────────────
  lucide_icons: ^0.257.0

  # ── Mapas ─────────────────────────────────────────────────────
  google_maps_flutter: ^2.5.0

  # ── Imágenes ──────────────────────────────────────────────────
  cached_network_image: ^3.3.0

  # ── UI / Utilidades ───────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.2.0
  flutter_svg: ^2.0.10

  # ── Cupertino Icons ───────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # ✅ AQUÍ VA
  flutter_launcher_icons: ^0.13.1

# ✅ ESTO VA FUERA DE TODO
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0D9488"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    # Vídeo de loading
    - assets/animations/logo-loading.mp4

    # Modelos 3D de coches
    - assets/animations/car-small.glb
    - assets/animations/car-medium.glb
    - assets/animations/car-large.glb
    - assets/animations/car-sport.glb
    - assets/animations/car-suv.glb
    - assets/animations/car-van.glb

    # Imágenes generales
    - assets/images/