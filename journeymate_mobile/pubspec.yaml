name: journeymate_mobile
description: "JourneyMate - Tu compañero de viaje inteligente"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Navegación ────────────────────────────────────────────────
  go_router: ^14.0.0                  # react-router-dom → go_router

  # ── Animaciones ───────────────────────────────────────────────
  flutter_animate: ^4.5.0             # animejs → flutter_animate

  # ── Red / HTTP ────────────────────────────────────────────────
  http: ^1.2.0                        # fetch API → http
  dio: ^5.4.3                         # axios (para servicios con interceptores)

  # ── Almacenamiento local ──────────────────────────────────────
  shared_preferences: ^2.3.0          # localStorage → shared_preferences

  # ── 3D / Assets ───────────────────────────────────────────────
  model_viewer_plus: ^1.9.0           # Car3D (.glb) → model_viewer_plus
  video_player: ^2.9.1                # LoadingVideo (.mp4) → video_player

  # ── Iconos ────────────────────────────────────────────────────
  lucide_icons: ^0.257.0           # lucide-react → lucide_icons

  # ── Mapas (HotelMap) ─────────────────────────────────────────
  google_maps_flutter: ^2.9.0         # Google Maps → google_maps_flutter

  # ── Imágenes ─────────────────────────────────────────────────
  cached_network_image: ^3.3.1        # lazy loading de imágenes

  # ── PDF (AITravelAssistant) ───────────────────────────────────
  pdf: ^3.11.1                        # html2pdf.js → pdf
  printing: ^5.13.1                   # compartir/imprimir PDF

  # ── UI / Utilidades ───────────────────────────────────────────
  intl: ^0.19.0                       # Intl.NumberFormat → intl
  url_launcher: ^6.3.0                # abrir links externos
  flutter_svg: ^2.0.10                # SVGs del footer (iconos RRSS)

  # ── Cupertino Icons (viene por defecto, mantenlo) ─────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    # Vídeo de loading
    - assets/animations/logo-loading.mp4
    # Modelos 3D de coches
    - assets/animations/car-small.glb
    - assets/animations/car-medium.glb
    - assets/animations/car-large.glb
    - assets/animations/car-sport.glb
    - assets/animations/car-suv.glb
    - assets/animations/car-van.glb
    # Imágenes generales
    - assets/images/

  # Si tienes fuentes propias descomenta esto:
  # fonts:
  #   - family: Geist
  #     fonts:
  #       - asset: assets/fonts/Geist-Regular.ttf
  #       - asset: assets/fonts/Geist-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Geist-Black.ttf
  #         weight: 900